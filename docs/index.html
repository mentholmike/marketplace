<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wagmios Marketplace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0b;
      color: #e5e5e5;
      min-height: 100vh;
    }
    .hero {
      text-align: center;
      padding: 80px 20px 60px;
      background: linear-gradient(180deg, #111 0%, #0a0a0b 100%);
      border-bottom: 1px solid #1a1a1a;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    .hero h1 span { color: #6366f1; }
    .hero p {
      font-size: 1.1rem;
      color: #888;
      max-width: 560px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .hero .badge {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      color: #818cf8;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    .search-box {
      width: 100%;
      max-width: 480px;
      margin: 0 auto 48px;
      display: block;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      color: #e5e5e5;
      outline: none;
    }
    .search-box:focus { border-color: #6366f1; }
    .category { margin-bottom: 60px; }
    .category h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      border-color: #6366f1;
      transform: translateY(-2px);
    }
    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .card-icon img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
    .card-icon svg {
      width: 32px;
      height: 32px;
    }
    .card-content { flex: 1; min-width: 0; }
    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 0.82rem;
      color: #666;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
    .card-port {
      font-size: 0.75rem;
      color: #444;
    }
    .card-port span {
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 6px;
      color: #6366f1;
    }
    .card-category {
      font-size: 0.7rem;
      color: #555;
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: #444;
      font-size: 0.85rem;
      border-top: 1px solid #1a1a1a;
    }
    .footer a { color: #6366f1; text-decoration: none; }
    .no-results {
      text-align: center;
      color: #555;
      padding: 40px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>Container <span>Marketplace</span></h1>
  <p>Pre-configured Docker Compose templates for self-hosted apps. Browse, install, and manage with your AI agent.</p>
  <span class="badge">35 Apps Available</span>
</div>

<div class="container">
  <input type="text" class="search-box" id="search" placeholder="Search apps..." oninput="filterApps()">

  <div id="no-results" class="no-results" style="display:none">No apps match your search.</div>

  <div id="categories"></div>
</div>

<div class="footer">
  <p><a href="https://github.com/mentholmike/marketplace">View on GitHub</a> · Powered by <a href="https://github.com/mentholmike/wagmios">Wagmios</a></p>
</div>

<script>
const MANIFEST = "https://raw.githubusercontent.com/mentholmike/marketplace/master/manifest.json";

const CATEGORY_ORDER = [
  "AI & ML",
  "Analytics",
  "Arr Stack",
  "Cloud Storage",
  "Container Management",
  "Database",
  "Gaming",
  "Home Automation",
  "Media Servers",
  "Monitoring",
  "Networking",
  "Notifications",
  "Photo & Video",
  "Productivity",
  "Search",
  "Security",
  "Torrents",
  "Utilities",
  "VPN"
];

fetch(MANIFEST)
  .then(r => r.json())
  .then(data => render(data.apps))
  .catch(() => {
    document.getElementById("categories").innerHTML =
      '<p style="text-align:center;color:#555">Failed to load apps. <a href="https://github.com/mentholmike/marketplace" style="color:#6366f1">View on GitHub</a>.</p>';
  });

function render(apps) {
  const categories = {};
  apps.forEach(app => {
    const cat = app.category || "Other";
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(app);
  });

  const container = document.getElementById("categories");
  CATEGORY_ORDER.forEach(cat => {
    if (!categories[cat]) return;
    const section = document.createElement("div");
    section.className = "category";
    section.innerHTML = `<h2>${cat}</h2><div class="grid" data-category="${cat}"></div>`;
    const grid = section.querySelector(".grid");

    categories[cat].forEach(app => {
      const port = app.defaultPort ? `<span>${app.defaultPort}</span>` : "";
      const card = document.createElement("a");
      card.className = "card";
      card.href = `https://github.com/mentholmike/marketplace/blob/master/apps/${app.id}.md`;
      card.target = "_blank";
      card.dataset.search = `${app.name} ${app.description} ${app.id}`.toLowerCase();
      card.innerHTML = `
        <div class="card-icon">
          <img src="${app.logo}" alt="${app.name}" onerror="this.parent.innerHTML='<svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'%236366f1\\' stroke-width=\\'2\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'3\\'/><path d=\\'M9 9h6M9 12h6M9 15h4\\'/></svg>'">
        </div>
        <div class="card-content">
          <div class="card-name">${app.name}</div>
          <div class="card-desc">${app.description}</div>
          <div class="card-footer">
            <div class="card-port">${port}</div>
            <div class="card-category">${app.category}</div>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    container.appendChild(section);
  });
}

function filterApps() {
  const q = document.getElementById("search").value.toLowerCase();
  let visible = 0;
  document.querySelectorAll(".card").forEach(card => {
    const match = card.dataset.search.includes(q);
    card.style.display = match ? "" : "none";
    if (match) visible++;
  });
  document.querySelectorAll(".grid").forEach(grid => {
    const hasVisible = [...grid.children].some(c => c.style.display !== "none");
    grid.parentElement.style.display = hasVisible || !q ? "" : "none";
  });
  document.getElementById("no-results").style.display = visible === 0 && q ? "" : "none";
}
</script>
</body>
</html>
